name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create .env placeholder
        run: touch .env

      - name: Verify secrets
        run: |
          echo "SB_URL length: ${#SB_URL}"
          echo "SB_TOKEN length: ${#SB_TOKEN}"
        env:
          SB_URL: ${{ secrets.SB_URL }}
          SB_TOKEN: ${{ secrets.SB_TOKEN }}

      - name: Build Flutter Web
        run: |
          flutter build web --release --source-maps \
            "--dart-define=SB_URL=${{ secrets.SB_URL }}" \
            "--dart-define=SB_TOKEN=${{ secrets.SB_TOKEN }}"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build/web --project-name=sistemassi --commit-dirty=true
          preCommands: npx wrangler pages project create sistemassi --production-branch=main || true
