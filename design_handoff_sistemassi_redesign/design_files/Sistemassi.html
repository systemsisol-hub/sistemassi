<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sistemassi · Nuevo Estilo Visual</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="login.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="dashboard.jsx"></script>
<script type="text/babel" src="pages.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#344092",
  "density": "compact",
  "startScreen": "login",
  "railAutoExpand": true
}/*EDITMODE-END*/;

function App() {
  const [values, setValue] = useTweaks(DEFAULTS);
  const [screen, setScreen] = useState(values.startScreen || "login");
  const [active, setActive] = useState("profile");
  const [expanded, setExpanded] = useState(false);

  // Apply tweaks live
  useEffect(() => {
    const accent = values.accent || "#344092";
    document.documentElement.style.setProperty("--brand", accent);
    document.documentElement.style.setProperty("--brand-hover", shade(accent, -14));
    document.documentElement.style.setProperty("--brand-ink", shade(accent, -28));

    if (values.density === "compact") {
      document.documentElement.style.setProperty("--header-h", "44px");
      document.body.style.fontSize = "13px";
    } else if (values.density === "spacious") {
      document.documentElement.style.setProperty("--header-h", "60px");
      document.body.style.fontSize = "14.5px";
    } else {
      document.documentElement.style.setProperty("--header-h", "52px");
      document.body.style.fontSize = "14px";
    }
  }, [values]);

  function shade(hex, pct) {
    if (!hex || typeof hex !== "string") return "#344092";
    const h = hex.replace("#","");
    const r = parseInt(h.slice(0,2), 16);
    const g = parseInt(h.slice(2,4), 16);
    const b = parseInt(h.slice(4,6), 16);
    const f = 1 + pct/100;
    const clamp = (n) => Math.max(0, Math.min(255, Math.round(n*f)));
    return "#" + [clamp(r), clamp(g), clamp(b)].map(n => n.toString(16).padStart(2,"0")).join("");
  }

  const titles = {
    profile:   { title: "Mi Perfil", crumbs: ["Sistemassi", "Mi Perfil"] },
    social:    { title: "Social", crumbs: ["Sistemassi", "Social"] },
    signatures:{ title: "Firmas", crumbs: ["Sistemassi", "Firmas"] },
    calendar:  { title: "Calendario", crumbs: ["Sistemassi", "Calendario"] },
    incidents: { title: "Incidencias", crumbs: ["Sistemassi", "Operación", "Incidencias"] },
    inventory: { title: "Inventario ISSI", crumbs: ["Sistemassi", "Operación", "Inventario"] },
    attendance:{ title: "Asistencia", crumbs: ["Sistemassi", "Operación", "Asistencia"] },
    contacts:  { title: "Contactos externos", crumbs: ["Sistemassi", "Operación", "Contactos"] },
    users:     { title: "Usuarios", crumbs: ["Sistemassi", "Administración", "Usuarios"] },
    employees: { title: "Colaboradores (CSSI)", crumbs: ["Sistemassi", "Administración", "Colaboradores"] },
    bi:        { title: "Business Intelligence", crumbs: ["Sistemassi", "Administración", "BI"] },
    logs:      { title: "Logs del sistema", crumbs: ["Sistemassi", "Administración", "Logs"] },
  };

  if (screen === "login") {
    return (
      <>
        <LoginScreen onLogin={() => setScreen("app")}/>
        <TweaksPanelUI values={values} setValue={setValue} screen={screen} onJump={setScreen}/>
      </>
    );
  }

  const current = titles[active] || titles.profile;

  return (
    <>
      <div className={"app" + (expanded ? " expanded" : "")} data-screen-label="App">
        <Sidebar active={active} setActive={setActive} expanded={expanded} setExpanded={values.railAutoExpand ? setExpanded : () => {}}/>
        <div className="main">
          <Topbar title={current.title} crumbs={current.crumbs}/>
          <div className="content" key={active} data-screen-label={current.title}>
            {active === "profile" ? <Dashboard/> :
             active === "social" ? <SocialPage/> :
             active === "signatures" ? <SignaturesPage/> :
             active === "calendar" ? <CalendarPage/> :
             active === "incidents" ? <IncidenciasPage/> :
             active === "inventory" ? <InventoryPage/> :
             active === "attendance" ? <AttendancePage/> :
             active === "contacts" ? <ContactsPage/> :
             active === "users" ? <UsersPage/> :
             active === "employees" ? <CollaboratorsPage/> :
             active === "bi" ? <BiPage/> :
             active === "logs" ? <LogsPage/> :
             <Placeholder title={current.title}/>}
          </div>
        </div>
      </div>
      <TweaksPanelUI values={values} setValue={setValue} screen={screen} onJump={setScreen}/>
    </>
  );
}

function TweaksPanelUI({ values, setValue, screen, onJump }) {
  return (
    <TweaksPanel title="Tweaks">
      <TweakSection label="Vista"/>
      <TweakRadio label="Pantalla" value={screen}
        options={["login","app"]}
        onChange={(v) => onJump(v)}/>
      <TweakSection label="Marca"/>
      <TweakColor label="Color acento" value={values.accent || "#344092"} onChange={(v) => setValue("accent", v)}/>
      <TweakSection label="Layout"/>
      <TweakRadio label="Densidad" value={values.density || "balanced"}
        options={["compact","balanced","spacious"]}
        onChange={(v) => setValue("density", v)}/>
      <TweakToggle label="Sidebar auto-expandible" value={values.railAutoExpand !== false} onChange={(v) => setValue("railAutoExpand", v)}/>
    </TweaksPanel>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
